<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JSCY 통합 재무관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f7f5f0;--surface:#fff;--surface2:#f2efe8;--border:#e4e0d6;--border2:#ccc8be;
  --text:#1a1814;--text2:#6b6660;--text3:#9e9890;
  --accent:#2c4a3e;--accent2:#4a7c6b;--accent-light:#e8f0ed;
  --red:#a33020;--red-light:#faeae7;--amber:#8a5c10;--amber-light:#fdf3e3;
  --blue:#1a3d6b;--blue-light:#e8eef6;--rose:#7a3050;--rose-light:#f6ebf0;
  --violet:#4a3a80;--violet-light:#eeecf8;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.06);
}
body.corp{--accent:#1a3d6b;--accent2:#3a6098;--accent-light:#e8eef6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}
header{background:var(--accent);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15);transition:background .25s;}
.header-left{display:flex;align-items:center;gap:18px;}
.header-title{font-family:var(--serif);font-size:17px;font-weight:600;letter-spacing:-.01em;}
.mode-toggle{display:flex;background:rgba(255,255,255,.14);border-radius:8px;padding:3px;}
.mode-btn{border:none;background:transparent;color:rgba(255,255,255,.7);font-family:var(--sans);font-size:13px;font-weight:500;padding:5px 16px;border-radius:6px;cursor:pointer;transition:all .15s;}
.mode-btn.active{background:#fff;color:var(--accent);}
.header-right{display:flex;align-items:center;gap:14px;}
.header-month{display:flex;align-items:center;gap:10px;}
.month-btn{width:30px;height:30px;background:rgba(255,255,255,.15);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.month-btn:hover{background:rgba(255,255,255,.25);}
.month-text{font-size:15px;font-weight:500;min-width:90px;text-align:center;}
/* 동기화 상태 표시 */
.sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.7);padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.1);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:#4caf82;}
.sync-dot.saving{background:#f9a825;animation:pulse .8s infinite;}
.sync-dot.offline{background:#e53935;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.app{max-width:1100px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:start;}
.sidebar{position:sticky;top:80px;}
.nav-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.nav-item{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;color:var(--text2);font-size:13px;font-weight:400;border-bottom:1px solid var(--border);background:transparent;width:100%;text-align:left;}
.nav-item:last-child{border-bottom:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{border-left-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:500;}
.nav-icon{font-size:16px;flex-shrink:0;}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;background:var(--surface2);color:var(--text3);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;}
.nav-item.active .nav-badge{background:var(--accent);color:#fff;}
.sidebar-summary{margin-top:14px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);}
.sidebar-summary-title{font-family:var(--serif);font-size:12px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;}
.ss-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;}
.ss-label{color:var(--text2);}.ss-val{font-weight:600;}
.ss-divider{border:none;border-top:1px solid var(--border);margin:8px 0;}
.ss-balance{font-family:var(--serif);font-size:18px;font-weight:700;}
.progress-wrap{margin:6px 0 2px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.main{min-width:0;}
.panel{display:none;animation:fadeIn .2s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.section-heading{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.section-desc{font-size:12px;color:var(--text3);margin-bottom:20px;}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.card-header-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.card-header-text{flex:1;}
.card-header-title{font-size:13px;font-weight:600;color:var(--text);}
.card-header-sub{font-size:11px;color:var(--text3);}
.card-header-total{font-size:15px;font-weight:700;font-family:var(--serif);}
.card-body{padding:4px 0;}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 20px;border-bottom:1px solid var(--border);transition:background .1s;}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:var(--surface2);}
.item-name{flex:1;font-size:13px;color:var(--text2);background:transparent;border:1px solid transparent;border-radius:var(--radius-sm);padding:5px 8px;font-family:var(--sans);outline:none;transition:all .15s;min-width:0;}
.item-name:hover{border-color:var(--border);}
.item-name:focus{border-color:var(--accent2);background:var(--surface);box-shadow:0 0 0 3px rgba(58,96,152,.12);}
.item-amount{width:150px;height:34px;padding:0 12px;font-size:13px;font-family:var(--sans);text-align:right;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);transition:all .15s;outline:none;}
.item-amount:focus{border-color:var(--accent2);background:var(--surface);box-shadow:0 0 0 3px rgba(58,96,152,.12);}
.item-add{width:80px;height:34px;padding:0 8px;font-size:12px;font-family:var(--sans);text-align:right;background:var(--accent-light);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--accent2);transition:all .15s;outline:none;}
.item-add::placeholder{color:var(--text3);}
.item-add:focus{border-color:var(--accent2);background:var(--surface);box-shadow:0 0 0 3px rgba(58,96,152,.12);}
.item-add-icon{font-size:13px;color:var(--text3);flex-shrink:0;}
.item-unit{font-size:12px;color:var(--text3);width:14px;}
.item-del{width:26px;height:26px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:6px;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.item-del:hover{background:var(--red-light);color:var(--red);}
.add-row{padding:10px 20px;border-top:1px dashed var(--border2);}
.add-btn{width:100%;padding:8px;border:1px dashed var(--border2);background:transparent;color:var(--text2);border-radius:var(--radius-sm);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .15s;font-weight:500;}
.add-btn:hover{background:var(--surface2);border-color:var(--accent2);color:var(--accent);}
.subtotal-row{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:10px 20px;background:var(--surface2);border-top:1px solid var(--border);}
.subtotal-label{font-size:12px;color:var(--text3);}
.subtotal-val{font-size:14px;font-weight:700;font-family:var(--serif);}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.metric-label{font-size:11px;color:var(--text3);letter-spacing:.03em;margin-bottom:6px;}
.metric-val{font-size:22px;font-weight:700;font-family:var(--serif);line-height:1.2;margin-bottom:4px;}
.metric-sub{font-size:10px;color:var(--text3);}
.progress-wrap{margin:6px 0 2px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.chart-title{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text);display:flex;align-items:center;justify-content:space-between;}
.chart-layout{display:flex;align-items:center;gap:28px;}
.donut-wrap{position:relative;width:180px;height:180px;flex-shrink:0;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.donut-pct{font-size:22px;font-weight:700;font-family:var(--serif);color:var(--text);}
.donut-sub{font-size:10px;color:var(--text3);}
.legend{flex:1;display:flex;flex-direction:column;gap:8px;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-name{flex:1;color:var(--text2);}
.legend-pct{font-weight:600;color:var(--text);}
.legend-amt{color:var(--text3);font-size:11px;}
.rate-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.rate-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.rate-title{font-family:var(--serif);font-size:14px;font-weight:600;}
.rate-pct{font-size:28px;font-weight:700;font-family:var(--serif);}
.rate-bar-bg{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:8px;}
.rate-bar-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.rate-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}
.breakdown-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
.breakdown-row{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);gap:10px;}
.breakdown-row:last-child{border-bottom:none;}
.breakdown-color{width:3px;height:28px;border-radius:2px;flex-shrink:0;}
.breakdown-label{flex:1;font-size:13px;color:var(--text2);}
.breakdown-amt{font-size:13px;font-weight:600;font-family:var(--serif);color:var(--text);}
.breakdown-pct{font-size:11px;color:var(--text3);width:36px;text-align:right;}
.action-bar{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--surface);color:var(--text2);}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#234038;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .3s ease;z-index:999;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:28px 32px;width:340px;box-shadow:var(--shadow-lg);}
.modal-title{font-family:var(--serif);font-size:16px;font-weight:700;margin-bottom:8px;}
.modal-desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;}
.year-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.year-nav .month-btn{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.year-nav .month-btn:hover{background:var(--border);}
.year-text{font-family:var(--serif);font-size:16px;font-weight:700;min-width:80px;text-align:center;}
.stat-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;margin-bottom:16px;}
table.stat-table{width:100%;border-collapse:collapse;font-size:12px;min-width:720px;}
table.stat-table th,table.stat-table td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
table.stat-table th{background:var(--surface2);color:var(--text3);font-weight:600;font-size:11px;position:sticky;top:0;}
table.stat-table th:first-child,table.stat-table td:first-child{text-align:left;position:sticky;left:0;background:var(--surface);}
table.stat-table th:first-child{background:var(--surface2);z-index:2;}
table.stat-table tr:hover td{background:var(--accent-light);}
table.stat-table tr:hover td:first-child{background:var(--accent-light);}
.stat-row-label{color:var(--text2);font-weight:500;}
.stat-row-total td{font-weight:700;font-family:var(--serif);border-top:2px solid var(--border2);}
.stat-cell-pos{color:var(--accent);}
.stat-cell-neg{color:var(--red);}
.stat-cell-muted{color:var(--text3);}
.stat-yearcol{background:var(--accent-light) !important;font-weight:700;color:var(--accent) !important;}
/* ── 세금 계산기 ── */
.tc-row{display:flex;align-items:center;gap:10px;padding:9px 20px;border-bottom:1px solid var(--border);transition:background .1s;}
.tc-row:last-child{border-bottom:none;}
.tc-row:hover{background:var(--surface2);}
.tc-label{flex:1;font-size:13px;color:var(--text2);}
.tc-val{font-size:13px;font-weight:500;font-family:var(--serif);color:var(--text);text-align:right;}
.tc-sub{font-size:11px;color:var(--text3);}
.tc-input{width:150px;height:34px;padding:0 12px;font-size:13px;text-align:right;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);outline:none;transition:all .15s;font-family:var(--sans);flex-shrink:0;}
.tc-input:focus{border-color:var(--accent2);background:var(--surface);box-shadow:0 0 0 3px rgba(58,96,152,.12);}
.tc-hl{background:var(--surface2);}
.tc-hl-accent{background:var(--accent-light);}
.tc-notice{padding:10px 20px;font-size:11px;color:var(--amber);background:var(--amber-light);border-top:1px solid var(--border);}
.bracket-bar{display:flex;height:34px;border-radius:6px;overflow:hidden;margin-bottom:6px;}
.bracket-seg{display:flex;align-items:center;justify-content:center;transition:opacity .3s;}
.bracket-seg span{font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);pointer-events:none;}
.bracket-active-outline{outline:3px solid rgba(255,255,255,.9);outline-offset:-3px;}
.bracket-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;}
.tax-summary-bar{padding:18px 20px;background:var(--accent);text-align:center;border-radius:0 0 var(--radius) var(--radius);}
.tax-summary-main{font-family:var(--serif);font-size:28px;font-weight:700;color:#fff;}
.tax-summary-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:3px;}
/* 로딩 오버레이 */
#loading-overlay{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
#loading-overlay.hide{opacity:0;pointer-events:none;}
.loading-title{font-family:var(--serif);font-size:22px;color:#fff;font-weight:700;margin-bottom:10px;}
.loading-sub{font-size:13px;color:rgba(255,255,255,.7);}
.loading-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .app{grid-template-columns:1fr;}
  .header-title{display:none;}
  .sidebar{position:static;}
  .nav-card{display:flex;overflow-x:auto;}
  .nav-item{flex-direction:column;gap:4px;padding:10px 10px;font-size:11px;border-left:none;border-bottom:3px solid transparent;border-right:1px solid var(--border);white-space:nowrap;}
  .nav-item:last-child{border-right:none;}
  .nav-item.active{border-left:none;border-bottom-color:var(--accent);}
  .nav-badge{display:none;}
  .sidebar-summary{display:none;}
  .metrics-grid{grid-template-columns:repeat(2,1fr);}
  .chart-layout{flex-direction:column;}
  .item-amount{width:110px;}
  .item-add{width:60px;}
  .item-add-icon{display:none;}
  .tc-input{width:110px;}
  .sync-status span{display:none;}
  .item-row{flex-wrap:wrap;padding:10px 14px;gap:6px 8px;}
  .item-name{flex:1 1 100%;order:1;font-size:14px;}
  .item-amount{order:2;flex:1 1 auto;width:auto;min-width:0;}
  .item-unit{order:3;}
  .item-add{order:4;flex:1 1 auto;width:auto;min-width:0;}
  .item-del{order:5;}
}
</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-title">JSCY 재무관리</div>
  <div class="loading-sub">데이터 불러오는 중…</div>
</div>

<header>
  <div class="header-left">
    <div class="header-title">📒 JSCY 재무관리</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-family" onclick="switchBook('family')">🏡 가정</button>
      <button class="mode-btn" id="mode-company" onclick="switchBook('company')">🏢 회사</button>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">연결 중…</span>
    </div>
    <div class="header-month">
      <button class="month-btn" onclick="changeMonth(-1)">◀</button>
      <span class="month-text" id="monthLabel"></span>
      <button class="month-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <div class="modal-title">이 달 데이터를 초기화할까요?</div>
    <div class="modal-desc">현재 장부의 이번 달 항목·금액이 기본값으로 되돌아갑니다. 다른 달과 다른 장부는 유지됩니다.</div>
    <div class="modal-btns">
      <button class="btn" onclick="document.getElementById('resetModal').classList.remove('open')">취소</button>
      <button class="btn" style="background:var(--red);color:#fff;border-color:var(--red);" onclick="resetMonth()">초기화</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp4PETebvqQ-IOR_yjjiJhoaVpPanUBlQ",
  authDomain: "jscy-finance.firebaseapp.com",
  databaseURL: "https://jscy-finance-default-rtdb.firebaseio.com",

/* ════════════════════════════════════════
   Firebase 동기화 레이어
   ════════════════════════════════════════ */
const SYNC = {
  listeners: {},   // 현재 구독 중인 ref 해제 함수
  saving: false,
  saveTimer: null,

  // DB 경로: /finance/{bookId}/{year}/{month}
  path(bookId, y, m){ return `finance/${bookId}/${y}/${m}`; },

  // 현재 월 실시간 구독 시작
  subscribe(bookId, y, m, onData){
    this.unsubscribeAll();
    const key = this.path(bookId, y, m);
    const dbRef = ref(db, key);
    const unsub = onValue(dbRef, snap => {
      setSyncStatus('ok', '실시간 연결');
      if(snap.exists()) onData(snap.val());
      else onData(null); // 데이터 없음 → 기본값 사용
    }, err => {
      setSyncStatus('offline', '연결 오류');
      console.error(err);
    });
    this.listeners[key] = unsub;
  },

  unsubscribeAll(){
    Object.values(this.listeners).forEach(fn => fn());
    this.listeners = {};
  },

  // 저장 (300ms 디바운스)
  save(bookId, y, m, data){
    clearTimeout(this.saveTimer);
    setSyncStatus('saving', '저장 중…');
    this.saveTimer = setTimeout(() => {
      const dbRef = ref(db, this.path(bookId, y, m));
      set(dbRef, data)
        .then(() => setSyncStatus('ok', '저장됨'))
        .catch(() => setSyncStatus('offline', '저장 실패'));
    }, 300);
  },

  // 특정 월 데이터 1회 읽기 (통계용)
  async getOnce(bookId, y, m){
    const snap = await get(ref(db, this.path(bookId, y, m)));
    return snap.exists() ? snap.val() : null;
  }
};

function setSyncStatus(state, label){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(dot){ dot.className = 'sync-dot ' + state; }
  if(lbl) lbl.textContent = label;
}

/* ════════════════════════════════════════
   앱 전역에 SYNC 노출
   ════════════════════════════════════════ */
window.SYNC = SYNC;
window.setSyncStatus = setSyncStatus;
window.fbGetOnce = (bookId, y, m) => SYNC.getOnce(bookId, y, m);

// Firebase 준비 완료 → 앱 시작
window.firebaseReady = true;
if(window._pendingInit) window._pendingInit();

} catch(err) {
  console.error('Firebase 초기화 오류:', err);

  if(dot) dot.className = 'sync-dot offline';
  if(lbl) lbl.textContent = 'Firebase 오류 (로컬 모드)';
  // Firebase 실패해도 앱은 시작되도록 함 (로컬 전용 모드)
  window.firebaseReady = true;
  if(window._pendingInit) window._pendingInit();
}

function mergeDefaults(raw){
  const d=book.defaults();
  if(!raw)return d;
  Object.keys(d).forEach(c=>{if(!Array.isArray(raw[c]))raw[c]=d[c];});
  return raw;
}

function aggregate(d){
  const cs={};Object.keys(book.cats).forEach(c=>cs[c]=sumCat(d[c]));
  const m={};
  book.metrics.forEach(mt=>{if(mt.sumCats)m[mt.id]=mt.sumCats.reduce((s,c)=>s+(cs[c]||0),0);});
  book.metrics.forEach(mt=>{if(mt.base!==undefined)m[mt.id]=m[mt.base]-(mt.minus||[]).reduce((s,k)=>s+(m[k]||0),0);});
  return{cs,m};
}

function calcIncomeTax(base){
  if(base<=0)return 0;
  for(const b of TAX_BRACKETS)if(base<=b.max)return Math.max(0,Math.round(base*b.rate-b.ded));
  return Math.max(0,Math.round(base*.45-65_940_000));
}
function getBracketIdx(base){
  if(base<=0)return -1;
  for(let i=0;i<TAX_BRACKETS.length;i++)if(base<=TAX_BRACKETS[i].max)return i;
  return TAX_BRACKETS.length-1;
}
function getVatPeriod(mo){
  if(mo<=2) return{label:'1기 예정 (1~3월)',months:[0,1,2],deadline:'4월 25일'};
  if(mo<=5) return{label:'1기 확정 (4~6월)',months:[3,4,5],deadline:'7월 25일'};
  if(mo<=8) return{label:'2기 예정 (7~9월)',months:[6,7,8],deadline:'10월 25일'};
  return{label:'2기 확정 (10~12월)',months:[9,10,11],deadline:'다음해 1월 25일'};
}
async function getAccumVat(periodMonths){
  let t=0;
  for(const mo of periodMonths){
    const d=(mo===month)?data:await getMonthData(year,mo);
    if(!d)continue;
    t+=Math.max(0,(sumCat(d.revenue||[])-sumCat(d.cogs||[]))*.1);
  }
  return Math.round(t);
}

async function updateTaxCalc(){
  if(bookId!=='company')return;
  const me=document.getElementById('tc-method');
  if(!me)return;
  me.value=taxSettings.annualMethod||'projected';
  const setVal=(id,v)=>{const el=document.getElementById(id);if(el&&v)el.value=v;};
  setVal('tc-manual-val',taxSettings.annualManual);
  setVal('tc-pension',taxSettings.deductPension);
  setVal('tc-yellow',taxSettings.deductYellow);
  setVal('tc-deduct-other',taxSettings.deductOther);
  setVal('tc-credit-other',taxSettings.creditOther);
  const mr=document.getElementById('tc-manual-row');
  if(mr)mr.style.display=me.value==='manual'?'flex':'none';

  const {m}=aggregate(data);
  setText('tc-cur-profit',fmt(m.net));

  let annualProfit=0, methodLabel='이번달×12';
  const method=me.value;
  if(method==='projected'){
    annualProfit=m.net*12;
  }else if(method==='ytd'){
    let total=0,cnt=0;
    for(let mo=0;mo<=month;mo++){
      const d=(mo===month)?data:await getMonthData(year,mo);
      if(d){const{m:mm}=aggregate(d);if(mm.in||mm.out){total+=mm.net;cnt++;}}
    }
    annualProfit=cnt>0?total/cnt*12:0; methodLabel='YTD 평균×12';
  }else{
    annualProfit=parseFloat(taxSettings.annualManual)||0; methodLabel='직접 입력';
  }
  setText('tc-annual-profit',fmt(annualProfit));
  setText('tc-method-label',methodLabel);

  const rev=sumCat(data.revenue||[]);
  const cogs=sumCat(data.cogs||[]);
  const vatSales=Math.round(rev*.1);
  const vatPurchase=Math.round(cogs*.1);
  const vatDue=Math.max(0,vatSales-vatPurchase);
  setText('tc-vat-sales',fmt(vatSales));
  setText('tc-vat-purchase','−'+fmt(vatPurchase));
  setText('tc-vat-due',fmt(vatDue));
  setText('tc-vat-hdr',fmt(vatDue)+'/월');
  const period=getVatPeriod(month);
  setText('tc-period-label','▣ 신고 기간: '+period.label);
  setText('tc-period-deadline',period.deadline);
  getAccumVat(period.months).then(v=>setText('tc-vat-accum',fmt(v)));

  const pension=parseFloat(taxSettings.deductPension)||0;
  const yellow=Math.min(parseFloat(taxSettings.deductYellow)||0,5_000_000);
  const deductOther=parseFloat(taxSettings.deductOther)||0;
  const totalDeduct=1_500_000+pension+yellow+deductOther;
  setText('tc-total-deduct',fmt(totalDeduct));

  const creditOther=parseFloat(taxSettings.creditOther)||0;
  const totalCredit=70_000+creditOther;
  setText('tc-total-credit',fmt(totalCredit));

  const taxBase=Math.max(0,annualProfit-totalDeduct);
  const calcTax=calcIncomeTax(taxBase);
  const finalTax=Math.max(0,calcTax-totalCredit);
  const localTax=Math.round(finalTax*.1);
  const totalAnnualTax=finalTax+localTax;

  setText('tc-r-income',fmt(annualProfit));
  setText('tc-r-deduct','−'+fmt(totalDeduct));
  setText('tc-r-taxbase',fmt(taxBase));
  setText('tc-r-calctax',fmt(calcTax));
  setText('tc-r-credit','−'+fmt(totalCredit));
  setText('tc-r-income-tax',fmt(finalTax));
  setText('tc-r-local-tax',fmt(localTax));
  setText('tc-r-total',fmt(totalAnnualTax));
  setText('tc-it-hdr',fmt(totalAnnualTax));

  renderBracketBar(taxBase);

  _tcVatMonthly=vatDue;
  _tcItMonthly=Math.round(totalAnnualTax/12);
  const totalMonthly=_tcVatMonthly+_tcItMonthly;
  setText('tc-m-vat',fmt(_tcVatMonthly));
  setText('tc-m-it',fmt(_tcItMonthly));
  setText('tc-m-total',fmt(totalMonthly));
  const revPct=rev>0?Math.round(totalMonthly/rev*100):0;
  setText('tc-m-pct','매출 대비 '+revPct+'%');
  setText('nb-taxcalc',fmt(totalMonthly));
}

function renderBracketBar(taxBase){
  const bar=document.getElementById('tc-bracket-bar');
  const desc=document.getElementById('tc-bracket-desc');
  if(!bar)return;
  const segs=[
    {min:0,          max:14_000_000,  label:'6%', color:'#5fa87d'},
    {min:14_000_000, max:50_000_000,  label:'15%',color:'#4a8a6a'},
    {min:50_000_000, max:88_000_000,  label:'24%',color:'#c49a30'},
    {min:88_000_000, max:150_000_000, label:'35%',color:'#cc6030'},
    {min:150_000_000,max:300_000_000, label:'38%+',color:'#b03020'},
  ];
  const scaleMax=300_000_000;
  let html='';
  segs.forEach(s=>{
    const w=((Math.min(s.max,scaleMax)-s.min)/scaleMax*100).toFixed(2);
    const active=taxBase>s.min&&taxBase<=s.max;
    const filled=taxBase>s.max;
    const op=taxBase<=0?'.25':filled?'1':active?'1':'.3';
    const cls=active?'bracket-seg bracket-active-outline':'bracket-seg';
    html+=`<div class="${cls}" style="width:${w}%;background:${s.color};opacity:${op};" title="${s.label}"><span>${parseFloat(w)>4?s.label:''}</span></div>`;
  });
  bar.innerHTML=html;
  if(desc){
    const idx=getBracketIdx(taxBase);
    if(taxBase<=0){desc.innerHTML='<span style="color:var(--text3)">순이익이 없어 과세되지 않습니다.</span>';}
    else{const b=TAX_BRACKETS[idx];const sc=segs[Math.min(idx,4)];
      desc.innerHTML=`적용 세율: <strong style="color:${sc?.color||'#b03020'}">${b.label}</strong> 구간 &nbsp;|&nbsp; 산출세액 = 과세표준 × ${b.label} − 누진공제 ${fmt(b.ded)}`;}
  }
}

function onTaxChange(){
  const me=document.getElementById('tc-method');if(!me)return;
  taxSettings.annualMethod=me.value;
  taxSettings.annualManual=document.getElementById('tc-manual-val')?.value||'';
  taxSettings.deductPension=document.getElementById('tc-pension')?.value||'';
  taxSettings.deductYellow=document.getElementById('tc-yellow')?.value||'';
  taxSettings.deductOther=document.getElementById('tc-deduct-other')?.value||'';
  taxSettings.creditOther=document.getElementById('tc-credit-other')?.value||'';
  const mr=document.getElementById('tc-manual-row');
  if(mr)mr.style.display=me.value==='manual'?'flex':'none';
  saveTaxSettings();updateTaxCalc();
}

function applyTaxToProvision(){
  let vi=data.tax.findIndex(it=>it.n.includes('부가세'));
  if(vi<0){data.tax.unshift({n:'부가세 충당',a:''});vi=0;}
  data.tax[vi].a=String(Math.round(_tcVatMonthly));
  let ii=data.tax.findIndex(it=>it.n.includes('소득세'));
  if(ii<0){data.tax.push({n:'소득세 충당(종소세+지방소득세)',a:''});ii=data.tax.length-1;}
  data.tax[ii].a=String(Math.round(_tcItMonthly));
  save();renderList('tax');recalc();
  toast('세금 충당 탭에 적용되었습니다 ✓');
  setTimeout(()=>gotoPanel('tax'),700);
}

        ${cards}${footer}
        <div class="action-bar"><button class="btn" onclick="gotoPanel('${next}')">다음 →</button></div>
      </section>`;
    }
  });
  html+=`<section id="panel-summary" class="panel">
    <div class="section-heading">이번 달 요약</div>
    <div class="section-desc">전체 현황을 한눈에 확인하세요.</div>
    <div class="metrics-grid">${metricCardsHTML('m')}</div>
    <div class="rate-card">
      <div class="rate-header"><span class="rate-title">${book.rate.label}</span><span class="rate-pct" id="rate-pct" style="color:var(--accent)">0%</span></div>
      <div class="rate-bar-bg"><div class="rate-bar-fill" id="rate-bar" style="width:0%;background:var(--accent)"></div></div>
      <div class="rate-labels"><span>0%</span><span id="rate-goal-label" style="font-weight:600;color:var(--text3)">목표 ${book.rate.goal}%</span><span>100%</span></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">항목별 비율</div>
      <div class="chart-layout">
        <div class="donut-wrap"><canvas id="donut" width="180" height="180"></canvas>
          <div class="donut-center"><span class="donut-pct" id="donut-pct">—</span><span class="donut-sub">${book.donutCenterSub}</span></div></div>
        <div class="legend" id="donut-legend"></div>
      </div>
    </div>
    <div class="breakdown-card" id="breakdown-list"></div>
    <div class="action-bar">
      <button class="btn" onclick="exportCSV()">📥 이 달 CSV</button>
      <button class="btn" onclick="document.getElementById('resetModal').classList.add('open')">🗑 이 달 초기화</button>
    </div>
  </section>`;
  html+=`<section id="panel-stats" class="panel">
    <div class="section-heading">연간 통계</div>
    <div class="section-desc">선택 연도의 모든 달을 한 번에 비교하세요.</div>
    <div class="year-nav">
      <button class="month-btn" onclick="changeStatYear(-1)">◀</button>
      <span class="year-text" id="statYearLabel"></span>
      <button class="month-btn" onclick="changeStatYear(1)">▶</button>
    </div>
    <div class="metrics-grid">${metricCardsHTML('y')}</div>
    <div class="chart-card"><div class="chart-title">월별 추이</div><div style="position:relative;width:100%;height:280px;"><canvas id="yearBar"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">월별 ${book.rate.yLabel} 추이</div><div style="position:relative;width:100%;height:220px;"><canvas id="rateLine"></canvas></div></div>
    <div class="chart-title" style="margin:24px 0 12px;">월별 상세 내역표</div>
    <div class="stat-table-wrap"><table class="stat-table" id="statTable"></table></div>
    <div class="action-bar"><button class="btn" onclick="exportYearCSV()">📥 연간 CSV</button></div>
  </section>`;
  mainEl.innerHTML=html;
}

/* ════════════════════════════════════════
   항목 CRUD
   ════════════════════════════════════════ */
function renderList(cat){
  const wrap=document.getElementById('list-'+cat);if(!wrap)return;wrap.innerHTML='';
  (data[cat]||[]).forEach((it,idx)=>{
    const row=document.createElement('div');row.className='item-row';
    row.innerHTML=`<input class="item-name" type="text" value="${escHtml(it.n)}" placeholder="항목 이름" oninput="editName('${cat}',${idx},this.value)"/>
      <input class="item-amount" type="number" min="0" value="${it.a}" placeholder="0" id="amt-${cat}-${idx}" oninput="editAmount('${cat}',${idx},this.value)"/>
      <span class="item-unit">원</span>
      <span class="item-add-icon">＋</span>
      <input class="item-add" type="number" placeholder="0" title="입력 후 Enter: 기존 금액에 더하기" onkeydown="if(event.key==='Enter'){addToAmount('${cat}',${idx},this);}"/>
      <button class="item-del" onclick="delItem('${cat}',${idx})" title="삭제">✕</button>`;
    wrap.appendChild(row);
  });
}
function editName(cat,idx,val){data[cat][idx].n=val;save();}
function editAmount(cat,idx,val){data[cat][idx].a=val;save();recalc();}
function addToAmount(cat,idx,inputEl){
  const add=parseFloat(inputEl.value);
  if(!add){inputEl.value='';return;}
  const cur=parseFloat(data[cat][idx].a)||0;
  const newVal=cur+add;
  data[cat][idx].a=String(newVal);
  save();
  const amtEl=document.getElementById(`amt-${cat}-${idx}`);
  if(amtEl)amtEl.value=newVal;
  inputEl.value='';
  recalc();
  toast(`+${fmt(add)} 적용됨 → ${fmt(newVal)}`);
}
function addItem(cat){data[cat].push({n:'',a:''});save();renderList(cat);recalc();
  const inputs=document.getElementById('list-'+cat).querySelectorAll('.item-name');if(inputs.length)inputs[inputs.length-1].focus();}
function delItem(cat,idx){data[cat].splice(idx,1);save();renderList(cat);recalc();}
function renderAllLists(){Object.keys(book.cats).forEach(renderList);}

/* ════════════════════════════════════════
   계산/렌더
   ════════════════════════════════════════ */
function recalc(){
  const{cs,m}=aggregate(data);
  Object.keys(book.cats).forEach(c=>{setText('h-'+c,fmt(cs[c]));setText('sub-'+c,fmt(cs[c]));});
  book.panelOrder.forEach(k=>{
    const p=book.panels[k];
    if(p.type!=='calculator'){
      if(p.cats.length>1)setText('total-panel-'+k,fmt(p.cats.reduce((s,c)=>s+cs[c],0)));
      setText('nb-'+k,fmt(p.cats.reduce((s,c)=>s+cs[c],0)));
    }
  });
  book.metrics.forEach(mt=>{const el=document.getElementById('m-'+mt.id);
    if(el){el.textContent=fmt(m[mt.id]);if(mt.color==='dynamic')el.style.color=m[mt.id]>=0?'var(--accent)':'var(--red)';}});
  const rate=m[book.rate.den]>0?Math.round(m[book.rate.num]/m[book.rate.den]*100):0;
  setText('rate-pct',rate+'%');
  const bar=document.getElementById('rate-bar');
  if(bar){bar.style.width=Math.max(0,Math.min(rate,100))+'%';
    bar.style.background=rate<0?'var(--red)':rate>=book.rate.goal?'var(--accent)':rate>=book.rate.goal/2?'var(--blue)':'var(--amber)';}
  const gl=document.getElementById('rate-goal-label');
  if(gl){if(rate<0){gl.textContent='⚠️ 손실';gl.style.color='var(--red)';}
    else if(rate>=book.rate.goal){gl.textContent='🎉 목표 달성!';gl.style.color='var(--accent)';}
    else{gl.textContent='목표 '+book.rate.goal+'%';gl.style.color='var(--text3)';}}
  setText('donut-pct',m.in>0?Math.round(m.out/m.in*100)+'%':'—');
  const bd=document.getElementById('breakdown-list');
  if(bd){
    const total=book.donutCats.reduce((s,c)=>s+cs[c],0);
    let h=`<div class="breakdown-row" style="background:var(--surface2);"><div style="flex:1;font-size:12px;font-weight:600;color:var(--text3);">항목</div><div style="font-size:12px;font-weight:600;color:var(--text3);">금액</div><div style="width:36px;text-align:right;font-size:12px;font-weight:600;color:var(--text3);">비율</div></div>`;
    book.donutCats.forEach(c=>{h+=`<div class="breakdown-row"><div class="breakdown-color" style="background:${book.cats[c].hex}"></div><div class="breakdown-label">${book.cats[c].label}</div><div class="breakdown-amt">${fmt(cs[c])}</div><div class="breakdown-pct">${pct(cs[c],total)}</div></div>`;});
    h+=`<div class="breakdown-row" style="background:var(--surface2);"><div class="breakdown-color" style="background:transparent"></div><div class="breakdown-label" style="font-weight:600;">합계</div><div class="breakdown-amt" style="color:var(--red)">${fmt(total)}</div><div class="breakdown-pct" style="color:var(--text2)">${pct(total,m.in)}</div></div>`;
    bd.innerHTML=h;
  }
  book.sidebarRows.forEach(r=>setText('ss-'+r.ref,m[r.ref]>0?fmt(m[r.ref]):'—'));
  const ssn=document.getElementById('ss-net');
  if(ssn){ssn.textContent=m.in>0?fmt(m.net):'—';ssn.style.color=m.net>=0?'var(--accent)':'var(--red)';}
  const ssbar=document.getElementById('ss-bar');
  if(ssbar){ssbar.style.width=Math.max(0,Math.min(rate,100))+'%';
    ssbar.style.background=rate<0?'var(--red)':rate>=book.rate.goal?'var(--accent)':rate>=book.rate.goal/2?'var(--blue)':'var(--amber)';}
  setText('ss-bar-label',book.rate.yLabel+' '+rate+'%');
  if(document.getElementById('panel-summary')?.classList.contains('active'))renderDonut(cs);
  if(bookId==='company')updateTaxCalc();
}

function renderDonut(cs){
  const vals=book.donutCats.map(c=>cs[c]);
  const labels=book.donutCats.map(c=>book.cats[c].label);
  const colors=book.donutCats.map(c=>book.cats[c].hex);
  const total=vals.reduce((a,b)=>a+b,0);
  const legend=document.getElementById('donut-legend');legend.innerHTML='';
  labels.forEach((lbl,i)=>{const p=total>0?Math.round(vals[i]/total*100):0;
    legend.innerHTML+=`<div class="legend-row"><span class="legend-dot" style="background:${colors[i]}"></span><span class="legend-name">${lbl}</span><span class="legend-pct">${p}%</span><span class="legend-amt">${fmt(vals[i])}</span></div>`;});
  if(donutChart){donutChart.destroy();donutChart=null;}
  donutChart=new Chart(document.getElementById('donut').getContext('2d'),{type:'doughnut',
    data:{labels,datasets:[{data:total>0?vals:[1],backgroundColor:total>0?colors:['#e4e0d6'],borderWidth:3,borderColor:'#fff',hoverOffset:6}]},
    options:{responsive:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{enabled:total>0,callbacks:{label:(c)=>' '+c.label+': '+fmt(c.raw)}}},animation:{duration:500}}});
}

/* ════════════════════════════════════════
   연간 통계 (Firebase 비동기)
   ════════════════════════════════════════ */
function changeStatYear(d){statYear+=d;renderStats();}
async function gatherYear(y){
  const arr=[];
  for(let mo=0;mo<12;mo++){
    const d=await getMonthData(y,mo);
    arr.push(d?aggregate(d):null);
  }
  return arr;
}
async function renderStats(){
  document.getElementById('statYearLabel').textContent=statYear+'년';
  clearStatCache();
  const ms=await gatherYear(statYear);
  const tot={cs:{},m:{}}; Object.keys(book.cats).forEach(c=>tot.cs[c]=0);book.metrics.forEach(mt=>tot.m[mt.id]=0);
  let active=0;
  ms.forEach(a=>{if(a){Object.keys(book.cats).forEach(c=>tot.cs[c]+=a.cs[c]);book.metrics.forEach(mt=>tot.m[mt.id]+=a.m[mt.id]);if(a.m.in||a.m.out)active++;}});
  const avgDiv=active||1;
  book.metrics.forEach(mt=>{
    const el=document.getElementById('y-'+mt.id);
    if(el){el.textContent=fmt(tot.m[mt.id]);if(mt.color==='dynamic')el.style.color=tot.m[mt.id]>=0?'var(--accent)':'var(--red)';}
    const sub=document.getElementById('ysub-'+mt.id);
    if(sub){if(mt.id==='net'){const r=tot.m[book.rate.den]>0?Math.round(tot.m[book.rate.num]/tot.m[book.rate.den]*100):0;sub.textContent=book.rate.yLabel+' '+r+'%';}
      else sub.textContent='월평균 '+fmt(tot.m[mt.id]/avgDiv);}
  });
  const labels=MONTHS;
  const datasets=book.barSeries.map(s=>({label:s.label,data:ms.map(a=>a?Math.round(a.m[s.ref]):0),backgroundColor:s.color}));
  if(yearBarChart){yearBarChart.destroy();yearBarChart=null;}
  yearBarChart=new Chart(document.getElementById('yearBar').getContext('2d'),{type:'bar',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{ticks:{font:{size:11}},grid:{display:false}},y:{ticks:{font:{size:10},callback:(v)=>v>=10000?(v/10000)+'만':v},grid:{color:'#eee'}}},
      plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12,boxHeight:12,padding:14}},tooltip:{callbacks:{label:(c)=>' '+c.dataset.label+': '+fmt(c.raw)}}}}});
  const rateData=ms.map(a=>a&&a.m[book.rate.den]>0?Math.round(a.m[book.rate.num]/a.m[book.rate.den]*100):null);
  if(rateLineChart){rateLineChart.destroy();rateLineChart=null;}
  rateLineChart=new Chart(document.getElementById('rateLine').getContext('2d'),{type:'line',
    data:{labels,datasets:[
      {label:book.rate.yLabel+'(%)',data:rateData,borderColor:'#2c4a3e',backgroundColor:'rgba(74,124,107,.12)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#2c4a3e',spanGaps:true},
      {label:'목표 '+book.rate.goal+'%',data:labels.map(()=>book.rate.goal),borderColor:'#c99a3a',borderDash:[6,4],pointRadius:0,fill:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{ticks:{font:{size:11}},grid:{display:false}},y:{suggestedMin:0,suggestedMax:50,ticks:{font:{size:10},callback:(v)=>v+'%'},grid:{color:'#eee'}}},
      plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12,boxHeight:12,padding:14}},tooltip:{callbacks:{label:(c)=>' '+c.dataset.label+': '+(c.raw==null?'-':c.raw+'%')}}}}});
  renderStatTable(ms,tot);
}
function renderStatTable(ms,tot){
  const t=document.getElementById('statTable');
  let head='<thead><tr><th>항목</th>';for(let mo=0;mo<12;mo++)head+=`<th>${MONTHS[mo]}</th>`;head+='<th class="stat-yearcol">연간 합계</th></tr></thead>';
  const clsMap={pos:'stat-cell-pos',neg:'stat-cell-neg',muted:'stat-cell-muted','':''};
  let body='<tbody>';
  book.statRows.forEach(r=>{
    const isTotal=r.cls==='total';
    body+=`<tr class="${isTotal?'stat-row-total':''}"><td class="stat-row-label">${r.label}</td>`;
    for(let mo=0;mo<12;mo++){
      let val=0,has=false;
      if(ms[mo]){has=ms[mo].m.in||ms[mo].m.out;val=r.kind==='cat'?ms[mo].cs[r.ref]:ms[mo].m[r.ref];}
      const cls=(r.ref==='net'||isTotal)?(val>=0?'stat-cell-pos':'stat-cell-neg'):(val?clsMap[r.cls]:'stat-cell-muted');
      body+=`<td class="${cls}">${(has||val)?fmt(val):'-'}</td>`;
    }
    const yt=r.kind==='cat'?tot.cs[r.ref]:tot.m[r.ref];
    body+=`<td class="stat-yearcol">${(yt||r.ref==='net')?fmt(yt):'-'}</td></tr>`;
  });
  body+='</tbody>';t.innerHTML=head+body;
}

/* ════════════════════════════════════════
   CSV
   ════════════════════════════════════════ */
function exportCSV(){
  const rows=[['카테고리','항목','금액']];
  Object.keys(book.cats).forEach(c=>(data[c]||[]).forEach(it=>rows.push([book.cats[c].label,it.n,parseFloat(it.a)||0])));
  downloadCSV(rows,`${bookId==='family'?'가정':'회사'}_${year}년_${MONTHS[month]}.csv`);
}
async function exportYearCSV(){
  const ms=await gatherYear(statYear);
  const rows=[['항목',...MONTHS,'연간합계']];
  book.statRows.forEach(r=>{const row=[r.label.replace(/^[\s　]+/,'')];let t=0;
    for(let mo=0;mo<12;mo++){let v=0;if(ms[mo])v=r.kind==='cat'?ms[mo].cs[r.ref]:ms[mo].m[r.ref];row.push(Math.round(v));t+=v;}
    row.push(Math.round(t));rows.push(row);});
  downloadCSV(rows,`${bookId==='family'?'가정':'회사'}_${statYear}년_연간통계.csv`);
}
function downloadCSV(rows,filename){
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  toast('CSV 파일이 다운로드되었습니다');
}

/* ════════════════════════════════════════
   네비/전환
   ════════════════════════════════════════ */
function switchPanel(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('panel-'+name)?.classList.add('active');
  if(el)el.classList.add('active');
  else{const navEl=document.querySelector(`.nav-item[data-panel="${name}"]`);if(navEl)navEl.classList.add('active');}
  if(name==='summary')recalc();
  if(name==='stats'){statYear=year;renderStats();}
  if(name==='taxcalc')updateTaxCalc();
}
function gotoPanel(name){switchPanel(name);}
function destroyCharts(){[donutChart,yearBarChart,rateLineChart].forEach(c=>{if(c)c.destroy();});donutChart=yearBarChart=rateLineChart=null;}
function switchBook(name){
  if(name===bookId)return;
  destroyCharts();clearStatCache();
  bookId=name;book=BOOKS[name];
  document.body.classList.toggle('corp',name==='company');
  document.getElementById('mode-family').classList.toggle('active',name==='family');
  document.getElementById('mode-company').classList.toggle('active',name==='company');
  buildUI();
  subscribeCurrentMonth();
  switchPanel(book.panelOrder[0],document.querySelector(`.nav-item[data-panel="${book.panelOrder[0]}"]`));
}
function changeMonth(d){
  month+=d;if(month<0){month=11;year--;}if(month>11){month=0;year++;}
  document.getElementById('monthLabel').textContent=year+'년 '+MONTHS[month];
  clearStatCache();
  subscribeCurrentMonth();
  if(document.getElementById('panel-stats')?.classList.contains('active')){statYear=year;renderStats();}
}
function resetMonth(){
  data=book.defaults();save();
  document.getElementById('resetModal').classList.remove('open');
  renderAllLists();recalc();toast('초기화되었습니다');
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* ════════════════════════════════════════
   초기화
   ════════════════════════════════════════ */
function startApp(){
  document.getElementById('monthLabel').textContent=year+'년 '+MONTHS[month];
  loadTaxSettings();
  buildUI();
  subscribeCurrentMonth();
  switchPanel(book.panelOrder[0],document.querySelector(`.nav-item[data-panel="${book.panelOrder[0]}"]`));
  setTimeout(()=>{
    const ov=document.getElementById('loading-overlay');
    if(ov){ov.classList.add('hide');setTimeout(()=>ov.remove(),400);}
  },800);
}

if(window.firebaseReady) startApp();
else window._pendingInit = startApp;
</script>
